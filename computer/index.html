<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💻 Computer — Summer's Learning World</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a237e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;}
.icon{font-size:80px;animation:float 3s ease-in-out infinite;margin-bottom:16px;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:28px;font-weight:900;color:#fff;margin-bottom:8px;}
p{font-size:16px;color:rgba(255,255,255,.65);margin-bottom:32px;}
a{display:inline-block;background:rgba(255,255,255,.15);color:#fff;text-decoration:none;padding:12px 28px;border-radius:50px;font-weight:700;font-size:15px;border:2px solid rgba(255,255,255,.3);transition:background .2s;}
a:active{background:rgba(255,255,255,.25);}
</style>
</head>
<body>
<div class="icon">💻</div>
<h1>Computer Science</h1>
<p>กำลังสร้าง... เร็ว ๆ นี้! 🚀</p>
<a href="/">← กลับหน้าหลัก</a>
</body>
</html>
