<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌟 Summer's Learning World</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;user-select:none;-webkit-user-select:none;min-height:100vh;}

/* ── BACKGROUND STARS ── */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(78,205,196,.15) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(155,89,182,.15) 0%,transparent 60%),
             radial-gradient(ellipse at 50% 50%,rgba(255,107,107,.08) 0%,transparent 70%);
  pointer-events:none;
}

/* ── HEADER ── */
.hdr{
  text-align:center;padding:36px 20px 0;
}
.hdr-emoji{font-size:56px;display:block;margin-bottom:8px;animation:float 3s ease-in-out infinite;}
.hdr-title{font-size:26px;font-weight:900;color:#fff;letter-spacing:.5px;}
.hdr-sub{font-size:14px;color:rgba(255,255,255,.5);margin-top:6px;font-weight:500;}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  max-width:560px;
  margin:32px auto 0;
  padding:0 16px 48px;
}

/* ── SUBJECT CARD ── */
.card{
  border-radius:22px;
  padding:24px 16px 20px;
  text-decoration:none;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
  border:2px solid rgba(255,255,255,.1);
  cursor:pointer;
}
.card:active{transform:scale(.96);}
.card.available{box-shadow:0 8px 32px rgba(0,0,0,.4);}
.card.available:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5);}
.card.soon{opacity:.55;cursor:default;filter:grayscale(.4);}

.card-eng  {background:linear-gradient(145deg,#004d40,#00897b);}
.card-comp {background:linear-gradient(145deg,#1a237e,#3949ab);}
.card-math {background:linear-gradient(145deg,#4a148c,#7b1fa2);}
.card-sci  {background:linear-gradient(145deg,#b71c1c,#e53935);}

.card-icon{font-size:44px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));}
.card-subject{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;}
.card-topic{font-size:14px;font-weight:800;color:#fff;text-align:center;line-height:1.3;}
.card-thai{font-size:12px;color:rgba(255,255,255,.6);font-weight:500;}

.badge-new{
  position:absolute;top:10px;right:10px;
  background:#FFE66D;color:#333;
  font-size:10px;font-weight:900;
  padding:2px 8px;border-radius:20px;
  letter-spacing:.5px;
}
.badge-soon{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,.2);color:rgba(255,255,255,.8);
  font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;
  letter-spacing:.5px;
}

/* ── FOOTER ── */
.footer{text-align:center;color:rgba(255,255,255,.25);font-size:12px;padding-bottom:24px;}

/* ── SPARKLE PARTICLES ── */
.sparkle{position:fixed;pointer-events:none;font-size:20px;animation:sp 1.2s ease-out forwards;}
@keyframes sp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.4)}}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-emoji">🌟</span>
  <div class="hdr-title">Summer's Learning World</div>
  <div class="hdr-sub">โลกแห่งการเรียนรู้ของซัมเมอร์</div>
</header>

<div class="grid">

  <!-- English: Prepositions -->
  <a class="card card-eng available" href="/prepositions/">
    <span class="badge-new">NEW</span>
    <div class="card-icon">📚</div>
    <div class="card-subject">English</div>
    <div class="card-topic">Prepositions of Time</div>
    <div class="card-thai">IN · ON · AT</div>
  </a>

  <!-- Computer Science -->
  <a class="card card-comp available" href="/computer/">
    <span class="badge-new">NEW</span>
    <div class="card-icon">💻</div>
    <div class="card-subject">Computer</div>
    <div class="card-topic">Coming Soon!</div>
    <div class="card-thai">คอมพิวเตอร์</div>
  </a>

  <!-- Math placeholder -->
  <div class="card card-math soon">
    <span class="badge-soon">SOON</span>
    <div class="card-icon">🔢</div>
    <div class="card-subject">Math</div>
    <div class="card-topic">Numbers &amp; More</div>
    <div class="card-thai">คณิตศาสตร์</div>
  </div>

  <!-- Science placeholder -->
  <div class="card card-sci soon">
    <span class="badge-soon">SOON</span>
    <div class="card-icon">🔬</div>
    <div class="card-subject">Science</div>
    <div class="card-topic">Explore!</div>
    <div class="card-thai">วิทยาศาสตร์</div>
  </div>

</div>

<div class="footer">Tap a subject to start learning! 🚀</div>

<script>
'use strict';
const emojis = ['⭐','🌟','✨','💫','🎉'];
document.querySelectorAll('.card.available').forEach(card=>{
  card.addEventListener('click', e=>{
    const r = card.getBoundingClientRect();
    for(let i=0;i<5;i++){
      const s=document.createElement('div');
      s.className='sparkle';
      s.textContent=emojis[i];
      s.style.left=(r.left+r.width/2-10+( Math.random()*60-30))+'px';
      s.style.top=(r.top+r.height/2)+'px';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),1300);
    }
  });
});
</script>
</body>
</html>
